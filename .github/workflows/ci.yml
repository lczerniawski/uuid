name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    build-and-test:
        name: Build and test on ${{ matrix.runs-on }}
        runs-on: ${{ matrix.runs-on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runs-on: macos-latest
                    - runs-on: ubuntu-22.04
                    - runs-on: ubuntu-24.04-arm

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Pixi
              uses: prefix-dev/setup-pixi@v0

            - name: Install environment
              run: pixi install

            - name: Build package
              run: pixi run build

            - name: Run tests
              run: pixi run test
